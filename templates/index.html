<!DOCTYPE html>
<html>
<head>
    <title>AI Sentiment Analyzer</title>

    <style>

        body{
            background-color:#121212;
            color:white;
            font-family:Arial;
            text-align:center;
            padding-top:100px;
        }

        textarea{
            width:400px;
            height:120px;
            border-radius:10px;
            padding:10px;
            font-size:16px;
        }

        button{
            background-color:#00adb5;
            color:white;
            border:none;
            padding:12px 25px;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background-color:#008c94;
        }

        h1{
            color:#00adb5;
        }

        .result{
            margin-top:30px;
            font-size:28px;
        }

    </style>

</head>

<body>

    <h1>AI Sentiment Analyzer</h1>

    <form method="POST">

        <textarea name="text" placeholder="Enter your text here..."></textarea>

        <br><br>

        <button type="submit">Analyze Sentiment</button>

    </form>

    <div class="result">

        {% if result == "POSITIVE" %}
            😊 Positive

        {% elif result == "NEGATIVE" %}
            😠 Negative

        {% endif %}

    </div>

</body>
</html>
